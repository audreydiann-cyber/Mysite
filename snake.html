<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snake — Audrey's Web App</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0d0d0d;
      --surface: #161616;
      --border: #2a2a2a;
      --accent: #39ff14;
      --accent-dim: rgba(57, 255, 20, 0.15);
      --accent-glow: rgba(57, 255, 20, 0.4);
      --text: #e0e0e0;
      --muted: #555;
      --danger: #ff4444;
      --gold: #ffd700;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Space Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 1rem;
    }

    /* TOP BAR */
    .top-bar {
      width: 100%;
      max-width: 700px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.75rem 0;
      border-bottom: 1px solid var(--border);
      margin-bottom: 1.5rem;
    }
    .top-bar a {
      color: var(--muted);
      text-decoration: none;
      font-size: 0.72rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      transition: color 0.2s;
    }
    .top-bar a:hover { color: var(--text); }
    .top-bar .brand {
      font-family: 'Syne', sans-serif;
      font-size: 1rem;
      font-weight: 800;
      color: var(--accent);
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    /* HEADER */
    header {
      text-align: center;
      margin-bottom: 1.5rem;
    }
    header h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(2.5rem, 8vw, 4.5rem);
      font-weight: 800;
      color: var(--accent);
      text-shadow: 0 0 30px var(--accent-glow);
      letter-spacing: 6px;
      line-height: 1;
    }
    header p {
      font-size: 0.78rem;
      color: var(--muted);
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-top: 0.5rem;
    }

    /* SCOREBOARD */
    .scoreboard {
      display: flex;
      gap: 2rem;
      justify-content: center;
      margin-bottom: 1.25rem;
    }
    .score-box {
      text-align: center;
    }
    .score-label {
      font-size: 0.65rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.2rem;
    }
    .score-value {
      font-family: 'Syne', sans-serif;
      font-size: 2rem;
      font-weight: 800;
      color: var(--text);
    }
    .score-value.gold { color: var(--gold); }
    .score-value.accent { color: var(--accent); text-shadow: 0 0 12px var(--accent-glow); }

    /* CANVAS WRAPPER */
    .canvas-wrap {
      position: relative;
      border: 1px solid var(--border);
      box-shadow: 0 0 0 1px var(--border), 0 0 40px rgba(57,255,20,0.06);
    }

    canvas {
      display: block;
      background: var(--surface);
    }

    /* OVERLAY */
    .overlay {
      position: absolute;
      inset: 0;
      background: rgba(13,13,13,0.92);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    .overlay.hidden { display: none; }

    .overlay-title {
      font-family: 'Syne', sans-serif;
      font-size: 2.5rem;
      font-weight: 800;
      margin-bottom: 0.5rem;
    }
    .overlay-title.green { color: var(--accent); text-shadow: 0 0 20px var(--accent-glow); }
    .overlay-title.red { color: var(--danger); text-shadow: 0 0 20px rgba(255,68,68,0.4); }

    .overlay-sub {
      font-size: 0.8rem;
      color: var(--muted);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 0.75rem;
    }
    .overlay-score {
      font-family: 'Syne', sans-serif;
      font-size: 1.5rem;
      color: var(--text);
      margin-bottom: 1.75rem;
    }
    .overlay-score span { color: var(--accent); }

    .play-btn {
      background: transparent;
      border: 1px solid var(--accent);
      color: var(--accent);
      font-family: 'Space Mono', monospace;
      font-size: 0.85rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      padding: 0.85rem 2.5rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .play-btn:hover {
      background: var(--accent);
      color: #000;
      box-shadow: 0 0 20px var(--accent-glow);
    }

    /* CONTROLS */
    .controls {
      width: 100%;
      max-width: 500px;
      margin-top: 1.5rem;
    }
    .controls-title {
      font-size: 0.65rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--muted);
      text-align: center;
      margin-bottom: 1rem;
    }
    .key-row {
      display: flex;
      justify-content: center;
      gap: 0.5rem;
      margin-bottom: 0.5rem;
    }
    .key {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'Space Mono', monospace;
      font-size: 0.75rem;
      padding: 0.4rem 0.75rem;
      min-width: 44px;
      text-align: center;
    }
    .key.wide { min-width: 120px; }

    /* SPEED SELECTOR */
    .speed-row {
      display: flex;
      justify-content: center;
      gap: 0.75rem;
      margin-top: 1.25rem;
      align-items: center;
    }
    .speed-label {
      font-size: 0.65rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
    }
    .speed-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: 'Space Mono', monospace;
      font-size: 0.7rem;
      padding: 0.3rem 0.7rem;
      cursor: pointer;
      transition: all 0.15s;
      letter-spacing: 1px;
    }
    .speed-btn:hover, .speed-btn.active {
      border-color: var(--accent);
      color: var(--accent);
    }

    /* MOBILE DPAD */
    .dpad {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      margin-top: 1.25rem;
    }
    .dpad-row { display: flex; gap: 4px; }
    .dpad-btn {
      width: 56px;
      height: 56px;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 1.4rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .dpad-btn:active {
      background: var(--accent-dim);
      border-color: var(--accent);
      color: var(--accent);
    }
    .dpad-btn.center { background: transparent; border-color: transparent; cursor: default; }

    @media (max-width: 540px) {
      .dpad { display: flex; }
    }

    /* PARTICLES */
    .particle {
      position: absolute;
      pointer-events: none;
      border-radius: 50%;
      animation: pop 0.5s ease-out forwards;
    }
    @keyframes pop {
      0% { opacity: 1; transform: scale(1); }
      100% { opacity: 0; transform: scale(3) translateY(-20px); }
    }

    footer {
      margin-top: 2rem;
      font-size: 0.7rem;
      color: var(--muted);
      letter-spacing: 2px;
      text-transform: uppercase;
      text-align: center;
    }
    footer a { color: var(--muted); text-decoration: none; }
    footer a:hover { color: var(--text); }
  </style>
</head>
<body>

<div class="top-bar">
  <a href="travel.html">← Back to Travel</a>
  <span class="brand">Snake</span>
  <a href="index.html">Professional Site</a>
</div>

<header>
  <h1>SNAKE</h1>
  <p>Don't eat yourself</p>
</header>

<div class="scoreboard">
  <div class="score-box">
    <div class="score-label">Score</div>
    <div class="score-value accent" id="score">0</div>
  </div>
  <div class="score-box">
    <div class="score-label">Best</div>
    <div class="score-value gold" id="best">0</div>
  </div>
  <div class="score-box">
    <div class="score-label">Level</div>
    <div class="score-value" id="level">1</div>
  </div>
</div>

<div class="canvas-wrap">
  <canvas id="gameCanvas" width="500" height="500"></canvas>

  <div class="overlay" id="overlay">
    <div class="overlay-title green" id="overlay-title">SNAKE</div>
    <div class="overlay-sub" id="overlay-sub">Use arrow keys or WASD to move</div>
    <div class="overlay-score" id="overlay-score"></div>
    <button class="play-btn" id="start-btn" onclick="startGame()">Start Game</button>
  </div>
</div>

<div class="controls">
  <div class="controls-title">Controls</div>
  <div class="key-row">
    <div class="key">W ↑</div>
  </div>
  <div class="key-row">
    <div class="key">A ←</div>
    <div class="key">S ↓</div>
    <div class="key">D →</div>
  </div>
  <div class="key-row" style="margin-top:0.4rem;">
    <div class="key wide">Space — Pause</div>
  </div>

  <div class="speed-row">
    <span class="speed-label">Speed:</span>
    <button class="speed-btn active" onclick="setSpeed(150, this)">Slow</button>
    <button class="speed-btn" onclick="setSpeed(100, this)">Normal</button>
    <button class="speed-btn" onclick="setSpeed(65, this)">Fast</button>
    <button class="speed-btn" onclick="setSpeed(35, this)">Insane</button>
  </div>

  <div class="dpad">
    <div class="dpad-row">
      <div class="dpad-btn center"></div>
      <div class="dpad-btn" ontouchstart="setDir(0,-1)">↑</div>
      <div class="dpad-btn center"></div>
    </div>
    <div class="dpad-row">
      <div class="dpad-btn" ontouchstart="setDir(-1,0)">←</div>
      <div class="dpad-btn center"></div>
      <div class="dpad-btn" ontouchstart="setDir(1,0)">→</div>
    </div>
    <div class="dpad-row">
      <div class="dpad-btn center"></div>
      <div class="dpad-btn" ontouchstart="setDir(0,1)">↓</div>
      <div class="dpad-btn center"></div>
    </div>
  </div>
</div>

<footer>
  <p>Built by Audrey Bledsoe · <a href="travel.html">Travel Page</a> · <a href="index.html">Home</a></p>
</footer>

<script>
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');
  const GRID = 20;
  const COLS = canvas.width / GRID;
  const ROWS = canvas.height / GRID;

  let snake, dir, nextDir, food, bonusFood, score, best, level, gameLoop, baseSpeed, paused, running;
  best = parseInt(localStorage.getItem('snakeBest') || '0');
  document.getElementById('best').textContent = best;

  let speed = 150;

  function setSpeed(ms, btn) {
    speed = ms;
    baseSpeed = ms;
    document.querySelectorAll('.speed-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  }

  function rnd(max) { return Math.floor(Math.random() * max); }

  function randomFood(exclude) {
    let pos;
    do {
      pos = { x: rnd(COLS), y: rnd(ROWS) };
    } while (exclude.some(s => s.x === pos.x && s.y === pos.y));
    return pos;
  }

  function startGame() {
    snake = [
      { x: 10, y: 10 },
      { x: 9, y: 10 },
      { x: 8, y: 10 }
    ];
    dir = { x: 1, y: 0 };
    nextDir = { x: 1, y: 0 };
    score = 0;
    level = 1;
    bonusFood = null;
    baseSpeed = speed;
    paused = false;
    running = true;

    document.getElementById('overlay').classList.add('hidden');
    document.getElementById('score').textContent = 0;
    document.getElementById('level').textContent = 1;

    food = randomFood(snake);

    if (gameLoop) clearInterval(gameLoop);
    gameLoop = setInterval(tick, speed);
  }

  function setDir(dx, dy) {
    if (!running) return;
    if (dx === 1 && dir.x === -1) return;
    if (dx === -1 && dir.x === 1) return;
    if (dy === 1 && dir.y === -1) return;
    if (dy === -1 && dir.y === 1) return;
    nextDir = { x: dx, y: dy };
  }

  function tick() {
    if (paused) return;
    dir = { ...nextDir };

    const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

    // Wall collision
    if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) { endGame(); return; }
    // Self collision
    if (snake.some(s => s.x === head.x && s.y === head.y)) { endGame(); return; }

    snake.unshift(head);

    let ate = false;
    if (head.x === food.x && head.y === food.y) {
      score += 10;
      ate = true;
      spawnParticles(food.x * GRID + GRID / 2, food.y * GRID + GRID / 2, '#39ff14');
      food = randomFood(snake);

      // Level up every 50 pts
      const newLevel = Math.floor(score / 50) + 1;
      if (newLevel > level) {
        level = newLevel;
        document.getElementById('level').textContent = level;
        clearInterval(gameLoop);
        const newSpeed = Math.max(40, baseSpeed - (level - 1) * 10);
        gameLoop = setInterval(tick, newSpeed);
      }

      // Bonus food every 3 apples
      if (score % 30 === 0) {
        bonusFood = randomFood(snake);
        bonusFood.timer = 80;
      }
    }

    if (bonusFood) {
      if (head.x === bonusFood.x && head.y === bonusFood.y) {
        score += 25;
        spawnParticles(bonusFood.x * GRID + GRID / 2, bonusFood.y * GRID + GRID / 2, '#ffd700');
        bonusFood = null;
        ate = true;
      } else {
        bonusFood.timer--;
        if (bonusFood.timer <= 0) bonusFood = null;
      }
    }

    if (!ate) snake.pop();

    document.getElementById('score').textContent = score;
    draw();
  }

  function draw() {
    // Background
    ctx.fillStyle = '#161616';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Grid dots
    ctx.fillStyle = '#1e1e1e';
    for (let x = 0; x < COLS; x++) {
      for (let y = 0; y < ROWS; y++) {
        ctx.fillRect(x * GRID + GRID / 2 - 1, y * GRID + GRID / 2 - 1, 2, 2);
      }
    }

    // Food
    drawFood(food.x, food.y, '#39ff14', '#00cc00');

    // Bonus food
    if (bonusFood) {
      const flash = bonusFood.timer > 20 || Math.floor(bonusFood.timer / 4) % 2 === 0;
      if (flash) drawFood(bonusFood.x, bonusFood.y, '#ffd700', '#ff8c00');
    }

    // Snake
    snake.forEach((seg, i) => {
      const isHead = i === 0;
      const t = i / snake.length;
      const g = Math.floor(255 - t * 140);
      ctx.fillStyle = isHead ? '#39ff14' : `rgb(0, ${g}, 0)`;
      const pad = isHead ? 1 : 2;
      ctx.fillRect(seg.x * GRID + pad, seg.y * GRID + pad, GRID - pad * 2, GRID - pad * 2);

      if (isHead) {
        ctx.fillStyle = '#000';
        const eyeOff = dir.x !== 0 ? { ex: dir.x * 5, ey: -3, ex2: dir.x * 5, ey2: 3 }
                                    : { ex: -3, ey: dir.y * 5, ex2: 3, ey2: dir.y * 5 };
        ctx.fillRect(seg.x * GRID + GRID / 2 + eyeOff.ex - 2, seg.y * GRID + GRID / 2 + eyeOff.ey - 2, 3, 3);
        ctx.fillRect(seg.x * GRID + GRID / 2 + eyeOff.ex2 - 2, seg.y * GRID + GRID / 2 + eyeOff.ey2 - 2, 3, 3);
      }
    });
  }

  function drawFood(x, y, color, glow) {
    const cx = x * GRID + GRID / 2;
    const cy = y * GRID + GRID / 2;
    ctx.shadowColor = glow;
    ctx.shadowBlur = 12;
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.arc(cx, cy, GRID / 2 - 3, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;
  }

  function spawnParticles(x, y, color) {
    const wrap = document.querySelector('.canvas-wrap');
    for (let i = 0; i < 6; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      p.style.cssText = `left:${x}px;top:${y}px;width:6px;height:6px;background:${color};transform:translate(${(Math.random()-0.5)*30}px,${(Math.random()-0.5)*30}px)`;
      wrap.appendChild(p);
      setTimeout(() => p.remove(), 500);
    }
  }

  function endGame() {
    clearInterval(gameLoop);
    running = false;

    if (score > best) {
      best = score;
      localStorage.setItem('snakeBest', best);
      document.getElementById('best').textContent = best;
    }

    const overlay = document.getElementById('overlay');
    const title = document.getElementById('overlay-title');
    const sub = document.getElementById('overlay-sub');
    const scoreEl = document.getElementById('overlay-score');
    const btn = document.getElementById('start-btn');

    overlay.classList.remove('hidden');
    title.className = 'overlay-title red';
    title.textContent = 'GAME OVER';
    sub.textContent = score > best - 1 && score >= 10 ? '🏆 New High Score!' : 'Try again?';
    scoreEl.innerHTML = `Score: <span>${score}</span> · Best: <span>${best}</span>`;
    btn.textContent = 'Play Again';
  }

  // Keyboard
  document.addEventListener('keydown', e => {
    if (e.key === ' ') { e.preventDefault(); paused = !paused; return; }
    const map = {
      ArrowUp: [0,-1], ArrowDown: [0,1], ArrowLeft: [-1,0], ArrowRight: [1,0],
      w: [0,-1], s: [0,1], a: [-1,0], d: [1,0],
      W: [0,-1], S: [0,1], A: [-1,0], D: [1,0]
    };
    if (map[e.key]) {
      e.preventDefault();
      setDir(...map[e.key]);
    }
  });

  // Draw initial state
  ctx.fillStyle = '#161616';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
</script>

</body>
</html>
